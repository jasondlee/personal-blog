<!-- Capabilities Section -->
<section id="whatido" class="section py-16 bg-gray-100">
    <div class="container mx-auto px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">What I Do</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="capabilities-grid">
                <!-- Capabilities will be added by jQuery -->
                {#for cap in cdi:whatido}
                {@io.vertx.core.json.JsonObject cap}
                <div class="capability-card bg-white rounded-xl p-6 shadow-md" style="opacity: 0; animation: fadeInUp 0.6s ease-out 0.{cap_index}s forwards;">
                    <div class="text-5xl mb-4">{cap.getString("icon")}</div>
                    <h3 class="text-xl font-bold text-gray-900 mb-3">{cap.getString("title")}</h3>
                    <p class="text-gray-600 leading-relaxed">{cap.getString("description")}</p>
                </div>
                {/for}
            </div>
        </div>
    </div>
</section>
