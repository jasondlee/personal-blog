<!-- Tech Stack Section -->
<section id="whatiuse" class="section py-16 bg-white">
    <div class="container mx-auto px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">What I Use</h2>

            {#for tech in cdi:whatiuse.techs}
            <div class="mb-10">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">{tech.label}</h3>
                <div class="flex flex-wrap gap-3" id="enterprise">
                    {#let color=tech.color}
                    {#for badge in tech.entries}
                    <span class="tech-badge bg-{color}-100 text-{color}-700 px-4 py-2 rounded-lg font-medium border border-{color}-200" style="opacity: 1; transition: opacity 0.3s ease;">
                        {badge}
                    </span>
                    {/for}
                </div>
            </div>
            {/for}
        </div>
    </div>
</section>
