<section id="blogs" class="section py-16 bg-gray-100">
    {! TODO: Readd search !}
    <div class="container mx-auto px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold text-gray-900 mb-12">Latest Blog Entries</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="capabilities-grid">
                {#for post in site.collections.posts.subList(0, 6)}
                <div class="capability-card bg-white rounded-xl p-6 shadow-md"
                     style="opacity: 0; animation: fadeInUp 0.6s ease-out 0.{post_index}s forwards;">
                    {#if post.data.containsKey("image")}
                    <div class="text-5xl mb-4">
                        <img src="{post.image(post.data.image)}" style="max-height: 50px">
                    </div>
                    {/if}
                    <h3 class="text-xl font-bold text-gray-900 mb-3">{post.title}</h3>
                    <time class="text-sm text-gray-500 uppercase tracking-wide">
                        {!<div class="date">{post.date.format("d")}</div> !}
                        <div class="month-year">{post.date.format("MMM d YYYY")}</div>
                    </time>

                    <p class="text-gray-600 leading-relaxed">
                        {post.excerpt(75).raw}
                    </p>

                    <a href="{post.url.absolute}" class="atext-blue-800 hover:text-blue-600 font-medium">
                        Read More &rsaquo;
                    </a>
                </div>
                {/for}
            </div>
        </div>
        <div class="max-w-6xl mx-auto mt-6">
            <a href="/blogs" class="ztext-gray-600 hover:text-blue-600 transition-colors">
                <h2>See All Blog Entries &rsaquo;</h2>
            </a>
        </div>
    </div>
</section>
